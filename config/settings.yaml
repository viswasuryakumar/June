# June / JobRight auto-apply pipeline — runtime settings.
# Schema: src/config/settings.py:Settings
# This file ships with conservative defaults; tune before enabling `auto`
# approval_mode or raising max_applications_per_day.

max_applications_per_day: 5
min_match_score: 70

# Regexes are matched against the job title. A title matching any exclude
# regex is dropped even if it also matches an include regex.
title_include_regexes:
  - "(?i)software engineer"
  - "(?i)backend"
  - "(?i)platform engineer"
title_exclude_regexes:
  - "(?i)senior director"
  - "(?i)principal.*manager"

location_rules:
  remote_policy: "remote_only"   # remote_only | hybrid_ok | onsite_ok | any
  allowed_locations: []
  disallowed_locations: []

salary_floor: 100000
unknown_salary_policy: "accept"   # accept | reject jobs with no listed salary

blocklisted_companies: []

approval_mode: "approve_each"   # auto | approve_each | approve_batch

active_hours:
  start: "08:00"
  end: "20:00"
  timezone: "UTC"

per_domain_rate_limits:
  "jobright.ai": 20
  "greenhouse.io": 5
  "lever.co": 5
  "myworkdayjobs.com": 3
  "ashbyhq.com": 5
  "icims.com": 3

max_posting_age_days: 30

# Epic 3 (discovery) T3.1.2 / T3.2.2: pagination budget and the coarse
# score gate for opening a job's detail page (looser than min_match_score
# above, which is Selection's stricter apply-worthiness threshold).
max_discovery_pages: 10
discovery_enrichment_score_threshold: 50

# Epic 2 (auth) session lifecycle T2.3.3: never hammer the login endpoint.
max_login_failures: 3
login_backoff_base_seconds: 2.0

# Epic 4 (Selection Engine) T4.2.1: composite-score weights, must sum to 1.0.
score_weight_match: 0.4
score_weight_keyword_overlap: 0.25
score_weight_recency: 0.15
score_weight_salary_fit: 0.2

# Epic 4 T4.2.2: optional top-K LLM rationale pass ("why this fits / risks").
# Feature-flagged and off by default - the pipeline runs identically without
# it; only takes effect when a rationale_fn is also supplied by the caller.
enable_llm_rationale: false
llm_rationale_top_k: 5
